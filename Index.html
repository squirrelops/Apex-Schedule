<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Apex Baseball — 2026 UPG Spring League Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light only;
    --green: #0F3E2D;
    --green-light: #2a7a58;
    --cream: #EDE3D1;
    --cream-dark: #d9ccb5;
    --cream-darker: #c8b898;
    --card: #F7F2E8;
    --text: #0F3E2D;
    --gold: #a07830;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background: #EDE3D1 !important;
background-color: #EDE3D1 !important;
font-family: ‘DM Sans’, sans-serif;
color: #0F3E2D !important;
min-height: 100vh;
-webkit-text-size-adjust: 100%;
}

- { color-scheme: light only; }

.page {
background-color: #EDE3D1;
max-width: 720px;
margin: 0 auto;
padding: 0 24px 80px;
}

/* HEADER */
header {
text-align: center;
padding: 56px 0 40px;
border-bottom: 2px solid #0F3E2D;
margin-bottom: 40px;
background-color: #EDE3D1;
}

.top-rule {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
margin-bottom: 24px;
}

.rule-line {
height: 1px;
width: 60px;
background: #0F3E2D;
opacity: 0.35;
}

.league-tag {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #0F3E2D;
opacity: 0.55;
}

header h1 {
font-family: ‘Playfair Display’, Georgia, serif;
font-size: clamp(58px, 13vw, 108px);
font-weight: 900;
line-height: 0.88;
color: #0F3E2D;
letter-spacing: -0.01em;
}

header h1 .sub {
font-size: clamp(16px, 3.5vw, 26px);
font-weight: 700;
letter-spacing: 0.3em;
display: block;
margin-top: 8px;
color: #0F3E2D;
opacity: 0.5;
}

.season-stripe {
display: inline-block;
background: #0F3E2D;
color: #EDE3D1;
font-size: 10px;
letter-spacing: 0.2em;
text-transform: uppercase;
font-weight: 700;
padding: 7px 22px;
margin-top: 22px;
}

/* FILTER TABS */
.filter-bar {
display: flex;
gap: 6px;
flex-wrap: wrap;
margin-bottom: 32px;
justify-content: center;
}

.filter-btn {
background: #EDE3D1;
border: 1.5px solid #c8b898;
color: #0F3E2D;
opacity: 0.6;
padding: 7px 18px;
font-family: ‘DM Sans’, sans-serif;
font-size: 11px;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
cursor: pointer;
transition: all 0.15s;
}

.filter-btn:hover { opacity: 1; border-color: #0F3E2D; }

.filter-btn.active {
background: #0F3E2D;
border-color: #0F3E2D;
color: #EDE3D1;
opacity: 1;
}

/* MONTH HEADER */
.month-header {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.28em;
text-transform: uppercase;
color: #0F3E2D;
opacity: 0.4;
padding: 24px 0 10px;
border-bottom: 1px solid #d9ccb5;
margin-bottom: 14px;
background-color: #EDE3D1;
}

/* GAME CARD */
.game-card {
background: #F7F2E8 !important;
background-color: #F7F2E8 !important;
border: 1px solid #d9ccb5;
border-left: 6px solid #0F3E2D;
border-radius: 2px;
padding: 18px 20px;
margin-bottom: 10px;
display: grid;
grid-template-columns: 76px 1fr auto;
align-items: center;
gap: 16px;
transition: all 0.18s ease;
box-shadow:
0 2px 6px rgba(15,62,45,0.07),
0 4px 16px rgba(15,62,45,0.05);
}

.game-card:hover {
box-shadow:
0 4px 12px rgba(15,62,45,0.14),
0 8px 28px rgba(15,62,45,0.09);
transform: translateX(3px) translateY(-1px);
border-left-color: #2a7a58;
}

.game-card.past {
opacity: 0.45;
border-left-color: #c8b898;
box-shadow: 0 1px 4px rgba(15,62,45,0.04);
}

.game-card.upcoming {
border-left-color: #a07830;
box-shadow:
0 2px 6px rgba(160,120,48,0.1),
0 4px 18px rgba(160,120,48,0.07);
}

.game-card.upcoming:hover {
border-left-color: #c09040;
box-shadow:
0 4px 14px rgba(160,120,48,0.18),
0 8px 28px rgba(160,120,48,0.1);
}

.date-col {
text-align: center;
border-right: 1px solid #d9ccb5;
padding-right: 16px;
}

.date-day {
font-family: ‘Playfair Display’, Georgia, serif;
font-size: 38px;
font-weight: 900;
line-height: 1;
color: #0F3E2D;
}

.date-weekday {
font-size: 9px;
letter-spacing: 0.18em;
text-transform: uppercase;
color: #0F3E2D;
opacity: 0.38;
font-weight: 700;
margin-top: 2px;
}

.date-month {
font-size: 10px;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #0F3E2D;
opacity: 0.65;
font-weight: 700;
margin-top: 2px;
}

.game-col { min-width: 0; }

.game-matchups {
display: flex;
flex-direction: column;
gap: 7px;
}

.matchup-row {
display: flex;
align-items: baseline;
gap: 10px;
}

.game-time {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.06em;
color: #0F3E2D;
opacity: 0.4;
white-space: nowrap;
min-width: 38px;
}

.game-vs {
font-size: 14px;
font-weight: 500;
color: #0F3E2D;
line-height: 1.3;
}

.game-vs .apex-name {
color: #0F3E2D;
font-weight: 800;
}

.game-location {
font-size: 10.5px;
color: #0F3E2D;
opacity: 0.35;
margin-top: 7px;
font-style: italic;
}

/* STATUS BADGE */
.status-badge {
white-space: nowrap;
font-size: 9px;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
padding: 4px 10px;
align-self: flex-start;
}

.badge-today {
background: #0F3E2D;
color: #EDE3D1;
animation: bpulse 1.8s ease-in-out infinite;
}

@keyframes bpulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.6; }
}

.badge-upcoming {
color: #a07830;
border: 1.5px solid #a07830;
background: transparent;
}

.badge-past {
color: #c8b898;
border: 1.5px solid #c8b898;
background: transparent;
}

/* FOOTER */
footer {
text-align: center;
padding-top: 36px;
border-top: 1px solid #d9ccb5;
margin-top: 48px;
background-color: #EDE3D1;
}

.update-note {
font-size: 10px;
color: #0F3E2D;
opacity: 0.3;
letter-spacing: 0.1em;
text-transform: uppercase;
}

.upg-link {
display: inline-block;
margin-top: 8px;
font-size: 11px;
color: #0F3E2D;
text-decoration: none;
font-weight: 600;
opacity: 0.5;
letter-spacing: 0.06em;
}

.upg-link:hover { opacity: 1; text-decoration: underline; }

@media (max-width: 480px) {
.game-card { grid-template-columns: 60px 1fr; }
.status-badge { display: none; }
.date-day { font-size: 28px; }
}

@media (prefers-color-scheme: dark) {
html, body, .page, header, .game-card, .month-header, footer, .filter-btn {
background-color: #EDE3D1 !important;
color: #0F3E2D !important;
}
}
</style>

</head>
<body>
<div class="page">

  <header>
    <div class="top-rule">
      <span class="rule-line"></span>
      <span class="league-tag">UPG Spring Weekday League &middot; 11U</span>
      <span class="rule-line"></span>
    </div>
    <h1>APEX<span class="sub">Baseball Club</span></h1>
    <div class="season-stripe">2026 Game Schedule</div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterGames('all', this)">All Games</button>
    <button class="filter-btn" onclick="filterGames('upcoming', this)">Upcoming</button>
    <button class="filter-btn" onclick="filterGames('april', this)">April</button>
    <button class="filter-btn" onclick="filterGames('may', this)">May</button>
    <button class="filter-btn" onclick="filterGames('june', this)">June</button>
  </div>

  <div id="schedule-container"></div>

  <footer>
    <p class="update-note">Schedule updated per UPG Baseball &middot; Revised April 13, 2026</p>
    <a class="upg-link" href="https://www.upgbaseball.com/baseball/spring-weekday-league/" target="_blank">&nearr; Full league schedule at upgbaseball.com</a>
  </footer>

</div>

<script>
const today = new Date('2026-04-13');

const schedule = [
  {
    date: new Date('2026-04-13'), weekday: 'Mon', month: 'april',
    games: [
      { time: '4:20p', home: 'Utah Talons Red', away: 'Apex', apex: 'away' },
      { time: '6:20p', home: 'Apex', away: 'Utah Talons Black', apex: 'home' },
    ],
    location: 'Nephi Orgill Park – West Field',
  },
  {
    date: new Date('2026-04-15'), weekday: 'Wed', month: 'april',
    games: [{ time: '6:20p', home: 'Mountaineers', away: 'Apex', apex: 'away' }],
    location: 'Salem Loafer Complex – Field 5',
  },
  {
    date: new Date('2026-04-20'), weekday: 'Mon', month: 'april',
    games: [
      { time: '4:20p', home: 'Apex', away: 'Lehi Tigers', apex: 'home' },
      { time: '6:20p', home: 'Apex', away: 'SS Stingers', apex: 'home' },
    ],
    location: 'Salem Veterans Park – East Field',
  },
  {
    date: new Date('2026-04-22'), weekday: 'Wed', month: 'april',
    games: [{ time: '4:20p', home: 'Apex', away: 'OBC Warriors', apex: 'home' }],
    location: 'Salem Loafer Complex – Field 5',
  },
  {
    date: new Date('2026-04-27'), weekday: 'Mon', month: 'april',
    games: [
      { time: '4:20p', home: 'Apex', away: 'Mountaineers', apex: 'home' },
      { time: '6:20p', home: 'Xtreme', away: 'Apex', apex: 'away' },
    ],
    location: 'Salem Veterans Park / Loafer Field 5',
  },
  {
    date: new Date('2026-05-01'), weekday: 'Fri', month: 'may',
    games: [
      { time: '5:20p', home: 'Apex', away: 'Sabotage', apex: 'home' },
      { time: '7:20p', home: 'Apex', away: 'Red Sox', apex: 'home' },
    ],
    location: 'Payson Hillman Middle Complex – Field 4',
  },
  {
    date: new Date('2026-05-04'), weekday: 'Mon', month: 'may',
    games: [
      { time: '4:20p', home: 'Apex', away: 'L7 Weenies', apex: 'home' },
      { time: '8:20p', home: 'Sluggers', away: 'Apex', apex: 'away' },
    ],
    location: 'Spanish Fork Russell Swenson / Salem Veterans',
  },
  {
    date: new Date('2026-05-11'), weekday: 'Mon', month: 'may',
    games: [{ time: '4:20p', home: 'Apex', away: 'Coyotes', apex: 'home' }],
    location: 'Salem Loafer Complex – Field 5',
  },
  {
    date: new Date('2026-05-13'), weekday: 'Wed', month: 'may',
    games: [{ time: '5:00p', home: 'Apex', away: 'SC Naturals', apex: 'home' }],
    location: 'Salem Loafer Complex – Field 5',
  },
  {
    date: new Date('2026-05-20'), weekday: 'Wed', month: 'may',
    games: [{ time: '6:20p', home: 'Apex', away: 'SF Dudes', apex: 'home' }],
    location: 'Salem Veterans Park – East Field',
  },
  {
    date: new Date('2026-06-01'), weekday: 'Mon', month: 'june',
    games: [
      { time: '4:20p', home: 'UC Bambinos', away: 'Apex', apex: 'away' },
      { time: '8:20p', home: 'Apex', away: 'Millard Bombers', apex: 'home' },
    ],
    location: 'Nephi Nebo View Park',
  },
  {
    date: new Date('2026-06-08'), weekday: 'Mon', month: 'june',
    games: [
      { time: '4:20p', home: 'Apex', away: 'L7 Weenies', apex: 'home' },
      { time: '8:20p', home: 'Mountaineers', away: 'Apex', apex: 'away' },
    ],
    location: 'Salem Loafer Complex – Field 5',
  },
];

const monthLabels = { april: 'April', may: 'May', june: 'June' };

function getStatus(date) {
  if (date.toDateString() === today.toDateString()) return 'today';
  if (date < today) return 'past';
  return 'upcoming';
}

function renderMatchup(g) {
  const h = g.apex === 'home' ? `<span class="apex-name">Apex</span>` : g.home;
  const a = g.apex === 'away' ? `<span class="apex-name">Apex</span>` : g.away;
  return `<div class="matchup-row"><span class="game-time">${g.time}</span><span class="game-vs">${h} vs. ${a}</span></div>`;
}

function renderCard(e) {
  const status = getStatus(e.date);
  const day = e.date.getDate();
  const mon = e.month.substring(0,3).toUpperCase();
  const cardClass = status === 'past' ? 'past' : status === 'upcoming' ? 'upcoming' : '';
  const badgeClass = status === 'today' ? 'badge-today' : status === 'past' ? 'badge-past' : 'badge-upcoming';
  const badgeText = status === 'today' ? '&bull; Today' : status === 'past' ? 'Played' : 'Upcoming';
  return `<div class="game-card ${cardClass}">
    <div class="date-col">
      <div class="date-day">${day}</div>
      <div class="date-weekday">${e.weekday}</div>
      <div class="date-month">${mon}</div>
    </div>
    <div class="game-col">
      <div class="game-matchups">${e.games.map(renderMatchup).join('')}</div>
      <div class="game-location">&#x1F4CD; ${e.location}</div>
    </div>
    <span class="status-badge ${badgeClass}">${badgeText}</span>
  </div>`;
}

function renderAll(filter) {
  const container = document.getElementById('schedule-container');
  let html = '';

  if (filter === 'upcoming') {
    const entries = schedule.filter(e => getStatus(e.date) !== 'past');
    html = entries.length ? entries.map(renderCard).join('') : '<p style="text-align:center;opacity:0.3;padding:40px 0;font-size:13px;">No upcoming games.</p>';
  } else {
    for (const m of ['april','may','june']) {
      if (filter !== 'all' && filter !== m) continue;
      const entries = schedule.filter(e => e.month === m);
      if (!entries.length) continue;
      html += `<div><div class="month-header">${monthLabels[m]}</div>${entries.map(renderCard).join('')}</div>`;
    }
  }

  container.innerHTML = html;
}

function filterGames(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll(type);
}

renderAll('all');
</script>

</body>
</html>
